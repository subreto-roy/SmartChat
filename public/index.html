<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat Translator</title>
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body>

  <div class="app" id="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="left">
          <h2>💬 Chat Translator</h2>
          <p id="myNameDisplay"></p>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
      <div class="search-box">
        <input id="searchInput" placeholder="🔍 Search contacts..." />
      </div>
      <div class="contacts" id="contactList">
        <div class="no-contacts">No users online yet...</div>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-placeholder" id="chatPlaceholder">
        <div class="icon">💬</div>
        <p>Select a contact to start chatting</p>
      </div>
      <div class="chat-window" id="chatWindow">
        <div class="chat-header">
          <div class="avatar" id="chatAvatar"></div>
          <div class="info">
            <h3 id="chatName"></h3>
            <p id="chatStatus">online · auto-translating</p>
          </div>
        </div>
        <div id="messages"></div>
        <div class="typing-indicator" id="typingIndicator"></div>
        <div class="input-area">
          <input id="msgInput" placeholder="Type a message..." autocomplete="off" />
          <button id="sendBtn">➤</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
