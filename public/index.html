<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartChat</title>
  <link rel="stylesheet" href="css/index.css" />
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body>

  <div class="app" id="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="left">
          <h2>SmartChat</h2>
          <p id="myNameDisplay"></p>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
      <div class="search-box">
        <input id="searchInput" placeholder="🔍 Search contacts..." />
      </div>
      <div class="contacts" id="contactList">
        <div class="no-contacts">No users found...</div>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-placeholder" id="chatPlaceholder">
        <div class="icon">💬</div>
        <p>Select a contact to start chatting</p>
      </div>
      <div class="chat-window" id="chatWindow">
        <div class="chat-header">
          <div class="avatar" id="chatAvatar"></div>
          <div class="info">
            <h3 id="chatName"></h3>
            <p id="chatStatus">online · auto-translating</p>
          </div>
          <button id="callBtn" title="Voice Call">📞</button>
        </div>
        <div id="messages"></div>
        <div class="typing-indicator" id="typingIndicator"></div>
        <div class="input-area">
          <input id="msgInput" placeholder="Type a message..." autocomplete="off" />
          <button id="sendBtn">➤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Call Overlay -->
  <div id="callOverlay">
    <div class="call-box">

      <!-- Outgoing Call -->
      <div id="outgoingCall" style="display:none;">
        <div class="call-avatar">📞</div>
        <h3>Calling...</h3>
        <p>Waiting for answer</p>
        <div class="call-actions">
          <button class="btn-reject" id="cancelCallBtn" title="Cancel">📵</button>
        </div>
      </div>

      <!-- Incoming Call -->
      <div id="incomingCall" style="display:none;">
        <div class="call-avatar">📞</div>
        <h3 id="callCallerName"></h3>
        <p>Incoming voice call...</p>
        <div class="call-actions">
          <button class="btn-accept" id="acceptCallBtn" title="Accept">📞</button>
          <button class="btn-reject" id="rejectCallBtn" title="Reject">📵</button>
        </div>
      </div>

      <!-- Active Call -->
      <div id="activeCall" style="display:none;">
        <div class="call-avatar">🎙️</div>
        <h3 id="activeCallName">On Call</h3>
        <div class="call-duration" id="callDuration">00:00</div>
        <div class="call-actions">
          <button class="btn-end" id="endCallBtn" title="End Call">📵</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Audio Elements -->
  <audio id="localAudio" autoplay muted></audio>
  <audio id="remoteAudio" autoplay></audio>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
